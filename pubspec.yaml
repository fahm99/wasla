name: wasla_provider
description: Wasla Provider App - منصة وصلة للتعليم الإلكتروني
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  provider: ^6.1.1
  go_router: ^13.1.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  video_player: ^2.8.2
  chewie: 1.7.5
  syncfusion_flutter_pdf: ^24.2.8
  syncfusion_flutter_pdfviewer: ^24.2.8
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.1
  dropdown_button2: ^2.3.9
  table_calendar: ^3.0.9
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  fl_chart: ^0.66.0
  flutter_dotenv: ^5.1.0
  gotrue: ^2.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
